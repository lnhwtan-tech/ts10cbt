<div class="fade-in">
    <h1 class="page-title">Biểu đồ phân tích</h1>
    <p class="page-subtitle">Các biểu đồ trực quan hóa dữ liệu phân phối học sinh, trường học và phòng thi.</p>

    <div class="charts-grid mt-4">
        <!-- Distribution by Subject -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Phân bố thí sinh theo môn chuyên</span>
                <button class="chart-download" id="dl-c1" title="Tải biểu đồ PNG"><i class="fas fa-download"></i></button>
            </div>
            <div class="chart-container"><canvas id="chart-subjects-bar"></canvas></div>
        </div>

        <!-- Registration Ratio -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Tỷ lệ đăng ký tuyển sinh (%)</span>
                <button class="chart-download" id="dl-c2" title="Tải biểu đồ PNG"><i class="fas fa-download"></i></button>
            </div>
            <div class="chart-container"><canvas id="chart-subjects-pie"></canvas></div>
        </div>

        <!-- Top Schools -->
        <div class="chart-card full-width">
            <div class="chart-header">
                <span class="chart-title">Top 15 trường THCS có thí sinh đông nhất</span>
                <button class="chart-download" id="dl-c3" title="Tải biểu đồ PNG"><i class="fas fa-download"></i></button>
            </div>
            <div class="chart-container" style="height: 380px;"><canvas id="chart-schools-bar"></canvas></div>
        </div>

        <!-- Density of Rooms -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Mật độ thí sinh tại phòng thi</span>
                <button class="chart-download" id="dl-c4" title="Tải biểu đồ PNG"><i class="fas fa-download"></i></button>
            </div>
            <div class="chart-container"><canvas id="chart-rooms-bar"></canvas></div>
        </div>

        <!-- Birth Year Distribution -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Phân bố theo năm sinh</span>
                <button class="chart-download" id="dl-c5" title="Tải biểu đồ PNG"><i class="fas fa-download"></i></button>
            </div>
            <div class="chart-container"><canvas id="chart-birth-bar"></canvas></div>
        </div>
    </div>
</div>
