<!DOCTYPE html>
<html lang="vi" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Hệ thống thống kê tuyển sinh lớp 10 chuyên — tra cứu thí sinh, biểu đồ phân tích và tỷ lệ chọi.">
    <title>Hệ thống Thống kê Tuyển sinh Chuyên</title>

    <!-- Google Font - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- DataTables Bootstrap 5 integration CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css">

    <!-- Custom Style Modules -->
    <link rel="stylesheet" href="/ts10cbt/css/variables.css">
    <link rel="stylesheet" href="/ts10cbt/css/layout.css">
    <link rel="stylesheet" href="/ts10cbt/css/components.css">
    <link rel="stylesheet" href="/ts10cbt/css/charts.css">
    <link rel="stylesheet" href="/ts10cbt/css/animations.css">
    <link rel="stylesheet" href="/ts10cbt/css/responsive.css">
</head>

<body>

    <div class="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">💡</div>
                <div class="sidebar-title">TS 10</div>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>Tổng quan</span>
                </a>
                <a href="/students" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Danh sách thí sinh</span>
                </a>
                <a href="/charts" class="nav-item">
                    <i class="fas fa-chart-bar"></i>
                    <span>Biểu đồ phân tích</span>
                </a>
                <a href="/competition" class="nav-item">
                    <i class="fas fa-balance-scale"></i>
                    <span>Tỷ lệ chọi</span>
                </a>
                <a href="/subjects" class="nav-item">
                    <i class="fas fa-book"></i>
                    <span>Danh sách môn</span>
                </a>
                <a href="/ranking" class="nav-item">
                    <i class="fas fa-trophy"></i>
                    <span>Xếp hạng tuyển sinh</span>
                </a>
            </nav>

            <div class="sidebar-toggle">
                <button class="sidebar-toggle-btn" id="sidebar-toggle-btn" title="Thu gọn sidebar">
                    <i class="fas fa-angle-left"></i>
                </button>
            </div>
        </aside>

        <!-- Main App Area -->
        <main class="main">
            <!-- Top Sticky Header -->
            <header class="header">
                <div class="header-left">
                    <button class="mobile-menu-btn" id="mobile-menu-btn">
                        <i class="fas fa-bars"></i>
                    </button>
                    <!-- Breadcrumbs -->
                    <nav class="breadcrumb-nav" id="breadcrumb">
                        <span class="current"><i class="fas fa-home"></i> Tổng quan</span>
                    </nav>
                </div>

                <div class="header-right">
                    <!-- Global Realtime Search -->
                    <div class="global-search">
                        <i class="fas fa-search global-search-icon"></i>
                        <input type="text" class="global-search-input" id="global-search-input"
                            placeholder="Tìm kiếm nhanh...">
                        <!-- Suggestions Dropdown -->
                        <div class="search-results-dropdown" id="search-dropdown"></div>
                    </div>

                    <!-- Theme Toggle -->
                    <button class="theme-toggle" id="theme-toggle" title="Chuyển chế độ sáng/tối">
                        <i class="fas fa-sun"></i>
                    </button>

                    <!-- Avatar Indicator -->
                    <div class="header-avatar" title="Thông tin kỳ thi">AD</div>
                </div>
            </header>

            <!-- Routed view content -->
            <div class="content" id="content">
                <!-- Skeletons loaded dynamically by JavaScript -->
            </div>
            <footer style="
                margin-top:auto;
                padding:18px 24px;
                display:flex;
                justify-content:space-between;
                align-items:center;
                flex-wrap:wrap;
                gap:12px;
                border-top:1px solid rgba(255,255,255,.08);
                background:var(--surface-color,#111827);
                color:var(--text-secondary,#9ca3af);
                font-size:.9rem;
            ">
                <div>
                    © 2026 <strong style="color:var(--text-primary,#fff);">Duckzii-dev</strong>. All rights reserved.
                </div>

                <div style="
                    display:flex;
                    align-items:center;
                    gap:10px;
                    flex-wrap:wrap;
                ">
                    <span><i class="fas fa-code"></i> Designed &amp; Developed by Duckzii-dev</span>
                    <span style="opacity:.5;">•</span>
                    <span><i class="fas fa-chart-line"></i> Analytics v1.0.0</span>
                </div>
            </footer>
        </main>
    </div>

    <!-- ────── Third-Party Scripts ────── -->
    <!-- jQuery (Needed for DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js" defer></script>
    <!-- Bootstrap 5 Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" defer></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <!-- DataTables Core & Bootstrap 5 integration -->
    <script src="https://cdn.datatables.net/1.13.5/js/jquery.dataTables.min.js" defer></script>
    <script src="https://cdn.datatables.net/1.13.5/js/dataTables.bootstrap5.min.js" defer></script>
    <script>
        (() => {
            const redirect = sessionStorage.getItem("redirect");

            if (redirect) {
                sessionStorage.removeItem("redirect");
                history.replaceState(null, "", redirect);
            }
        })();
    </script>
    <!-- Main Application Script -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
